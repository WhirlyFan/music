map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20m;

    # Pass through standard proxy headers + django-guid request id.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Backend routes.
    location ~ ^/(api|_allauth|admin|static|health)(/|$) {
        proxy_pass http://backend;
    }

    # Hatchet admin UI (proxied for convenience).
    location /hatchet-ui/ {
        proxy_pass http://hatchet:8888/;
        proxy_set_header Host $host;
    }

    # Everything else → Vite dev server, with WebSocket upgrade for HMR.
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

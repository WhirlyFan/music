map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20m;

    # Bigger request-header buffers. Everyone shares `localhost` in dev, so a
    # browser accumulates cookies from every other localhost app (Supabase
    # JWTs, PostHog, Stripe, other Django sessions, …). The combined Cookie
    # header can blow past nginx's default 8k buffer → a 400 before the
    # request even reaches Django. 4×16k absorbs a very full cookie jar.
    # (Prod doesn't need this — a real domain isn't a shared cookie dump.)
    large_client_header_buffers 4 16k;

    # Pass through standard proxy headers + django-guid request id.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Backend WebSockets (Channels). Needs the HTTP/1.1 upgrade headers; the
    # generic backend location below doesn't set them. In prod the browser hits
    # api.whirlyfan.com directly (Render static sites don't proxy WS), so this
    # block is dev-only parity.
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # Backend routes. `accounts` carries the social-login OAuth callback
    # (/accounts/google/login/callback/) — must be same-origin so the session
    # cookie set by allauth lands on this host.
    location ~ ^/(api|_allauth|admin|static|health|accounts)(/|$) {
        proxy_pass http://backend;
    }

    # Everything else → Vite dev server, with WebSocket upgrade for HMR.
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

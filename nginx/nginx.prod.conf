upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Backend routes. Django sets its own security response headers
    # (Content-Security-Policy, Permissions-Policy, Referrer-Policy) for these
    # via settings/prod.py — nginx must NOT add its own here or the browser
    # sees duplicate headers and enforces the *intersection*, which silently
    # breaks things.
    location ~ ^/(api|_allauth|admin|static|health)(/|$) {
        proxy_pass http://backend;
    }

    # Pre-built React bundle.
    root /usr/share/nginx/html;
    index index.html;

    # Static asset cache (hashed JS/CSS bundles).
    # `add_header` does NOT inherit across location blocks in nginx — if any
    # `add_header` is set in an inner block, the outer ones are dropped. So
    # security headers must be repeated everywhere nginx serves content.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback — any unknown URL serves index.html so client routes work.
    # Security headers are scoped to nginx-served paths (SPA shell + /assets/);
    # backend-proxied paths above keep Django's own headers untouched. The
    # policy mirrors the Django side — same baseline, one mental model.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss://api.whirlyfan.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https://accounts.google.com" always;
        add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=()" always;
        add_header Referrer-Policy "same-origin" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }
}

# Pin the compose project name so containers/volumes stay namespaced as
# `music_*` regardless of which directory the file lives in.
name: music

# Shared logging config — applied to every long-running service so logs
# never fill the host disk. The container runtime captures stdout/stderr;
# 10 MB × 3 files per service is plenty for local + small prod.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    command: postgres -c 'max_connections=200'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      # Postgres 18+ stores data in a major-version subdir under
      # /var/lib/postgresql (NOT /data) — mount the parent, per the official image.
      - postgres_data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # Local SMTP catch-all + web UI for dev — captures every outgoing email
  # without delivering anywhere. Backend's EMAIL_HOST points here in dev.py.
  # Web UI: http://localhost:8025. No auth (only reachable via docker network
  # + locally-bound ports). Pinned by image digest tag for supply-chain hygiene.
  mailpit:
    image: axllent/mailpit:v1.20.7
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP listener
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    # Secrets are fetched from Doppler *inside* the container at startup (see the
    # `entrypoint` below), so they live only in the process — never in a file and
    # never in this compose allowlist. Add a var in Doppler → it's here on the
    # next `make up`, no edits. We only pass the bootstrap DOPPLER_* (from your
    # shell, via `make up`) plus non-secret dev defaults; `doppler run` overrides
    # the latter if the same key exists in Doppler.
    environment:
      DOPPLER_TOKEN: ${DOPPLER_TOKEN:-}
      DOPPLER_PROJECT: ${DOPPLER_PROJECT:-}
      DOPPLER_CONFIG: ${DOPPLER_CONFIG:-}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost}
      # YOUTUBE_POT_BASE_URL is baked into the image (http://127.0.0.1:4416) — the
      # PO-token provider runs co-located inside the backend container. Override
      # here only to point at an external provider.
    volumes:
      - ./backend:/app
      # Anonymous volume to preserve the Linux .venv built into the image.
      # Without this, the host's macOS .venv would shadow it.
      - /app/.venv
    ports:
      - "8000:8000"
    # `doppler run` wraps the migrate-then-serve entrypoint so BOTH the migration
    # step and the server see the fetched secrets. (Prod/Render doesn't override
    # the entrypoint — it injects env directly, no Doppler in the loop.)
    entrypoint: ["doppler", "run", "--", "/app/docker-entrypoint.sh"]
    command: python manage.py runserver 0.0.0.0:8000
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev   # multi-stage Dockerfile defaults to the last stage (prod/nginx) without this
    restart: unless-stopped
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      # Mount the repo-root `docs/` inside the frontend's project root at
      # `/app/_docs` so Vite's `import.meta.glob('/_docs/**/*.md')` can
      # resolve it as a project-root-relative path. Read-only — the SPA
      # only reads. (The `_docs` name avoids collision with any future
      # `frontend/docs/` directory.)
      - ./docs:/app/_docs:ro
    ports:
      - "5173:5173"
    command: pnpm dev --host
    logging: *default-logging

  nginx:
    image: nginx:1.30.2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    logging: *default-logging

volumes:
  postgres_data:

# Pin the compose project name so containers/volumes stay namespaced as
# `react-django-template_*` regardless of which directory the file lives in.
name: react-django-template

# Shared logging config — applied to every long-running service so logs
# never fill the host disk. The container runtime captures stdout/stderr;
# 10 MB × 3 files per service is plenty for local + small prod.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:17.10-alpine
    restart: unless-stopped
    command: postgres -c 'max_connections=200'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Postgres can be slow to come up on first boot (running init.sql,
      # then user-creation, then becoming ready). Skip the healthcheck
      # retry counter during this warm-up so the container isn't marked
      # unhealthy before it finishes starting.
      start_period: 30s
    logging: *default-logging

  # Local SMTP catch-all + web UI for dev — captures every outgoing email
  # without delivering anywhere. Backend's EMAIL_HOST points here in dev.py.
  # Web UI: http://localhost:8025. No auth (only reachable via docker network
  # + locally-bound ports). Pinned by image digest tag for supply-chain hygiene.
  mailpit:
    image: axllent/mailpit:v1.20.7
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP listener
    logging: *default-logging

  hatchet:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:v0.86.29
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://app_admin:app_admin@db:5432/hatchetdb?sslmode=disable"
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet:7077
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: http://localhost:8888
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: hatchet:7077
    ports:
      - "8888:8888"  # admin UI
      - "7077:7077"  # gRPC
    volumes:
      - hatchet_config:/config
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_ADMIN: ${DATABASE_URL_ADMIN}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost}
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN:-}
      HATCHET_CLIENT_HOST_PORT: hatchet:7077
      HATCHET_CLIENT_TLS_STRATEGY: none
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./backend:/app
      # Anonymous volume to preserve the Linux .venv built into the image.
      # Without this, the host's macOS .venv would shadow it.
      - /app/.venv
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    logging: *default-logging

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      hatchet:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN:-}
      HATCHET_CLIENT_HOST_PORT: hatchet:7077
      HATCHET_CLIENT_TLS_STRATEGY: none
    volumes:
      - ./backend:/app
      - /app/.venv
    command: python manage.py hatchet_worker
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev   # multi-stage Dockerfile defaults to the last stage (prod/nginx) without this
    restart: unless-stopped
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: pnpm dev --host
    logging: *default-logging

  nginx:
    image: nginx:1.30.2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    logging: *default-logging

volumes:
  postgres_data:
  hatchet_config:

[project]
name = "backend"
version = "0.1.0"
description = "Django backend for 3d project"
requires-python = ">=3.13"
dependencies = [
    "django>=5.1,<6.0",
    "djangorestframework>=3.15",
    "django-allauth[socialaccount]>=65.0",
    "django-rls>=0.2",
    "drf-spectacular>=0.27",
    "django-filter>=24.0",
    "django-anymail>=11.0",
    "django-extensions>=3.2",
    "django-guid>=3.5",
    "django-axes>=7.0",
    "django-ratelimit>=4.1",
    "django-health-check>=3.18",
    "django-pghistory>=3.4",
    "django-pgtrigger>=4.11",
    "hatchet-sdk>=0.40",
    "sentry-sdk[django]>=2.0",
    "psycopg[binary]>=3.2",
    "dj-database-url>=2.2",
    "django-environ>=0.11",
    "django-cors-headers>=4.4",
    "whitenoise>=6.7",
    "gunicorn>=23.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.9",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "django-debug-toolbar>=4.4",
    "django-stubs[compatible-mypy]>=5.0",
    "djangorestframework-stubs>=3.15",
    "factory-boy>=3.3",
    "Faker>=30.0",
]

[tool.ruff]
target-version = "py313"
line-length = 100
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "DJ",  # flake8-django
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"**/settings/*.py" = ["F405", "F403"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
python_files = ["test_*.py", "*_test.py", "tests.py"]
addopts = "-ra --strict-markers"
testpaths = ["tests", "apps"]

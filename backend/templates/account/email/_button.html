<table role="presentation" cellpadding="0" cellspacing="0" style="margin:18px 0;">
  <tr>
    <td style="border-radius:10px;background:#6366f1;background-image:linear-gradient(135deg,#6366f1,#a78bfa);">
      <a
        href="{{ url }}"
        style="display:inline-block;padding:11px 22px;color:#ffffff;font-size:14px;font-weight:600;text-decoration:none;"
        >{{ label }}</a
      >
    </td>
  </tr>
</table>
<p style="margin:0;color:#9b9ba3;font-size:12px;word-break:break-all;">{{ url }}</p>

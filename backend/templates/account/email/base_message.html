<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="margin:0;padding:0;background:#f3f3f7;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f3f3f7;padding:24px 12px;">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="max-width:480px;background:#ffffff;border:1px solid #e9e9ef;border-radius:16px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;"
          >
            <tr>
              <td style="background:#6366f1;background-image:linear-gradient(135deg,#6366f1,#a78bfa);padding:22px 28px;">
                <span style="color:#ffffff;font-size:20px;font-weight:700;letter-spacing:-0.02em;">WhirlyFan</span>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;color:#18181b;font-size:15px;line-height:1.65;">
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px;border-top:1px solid #efeff3;color:#9b9ba3;font-size:12px;line-height:1.5;">
                — The WhirlyFan team
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>music</title>
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0b0b12; color: #e7e7ee;
        font: 16px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
      }
      .card { text-align: center; max-width: 24rem; width: 100%; padding: 2.5rem 2rem; box-sizing: border-box; }
      .brand {
        font-size: 2rem; font-weight: 600; letter-spacing: -0.02em;
        background: linear-gradient(110deg, #6366f1 35%, #c4b5fd 50%, #6366f1 65%);
        background-size: 200% auto;
        -webkit-background-clip: text; background-clip: text; color: transparent;
        animation: shimmer 3s linear infinite;
      }
      @keyframes shimmer { from { background-position: 200% center; } to { background-position: -200% center; } }
      h1 { font-size: 1.15rem; font-weight: 600; margin: 1.25rem 0 0.4rem; }
      p { margin: 0 0 0.75rem; color: #9a9aa8; font-size: 0.95rem; }
      p:last-child { margin-bottom: 0; }
      .ok { color: #34d399; }
      .email { color: #e7e7ee; font-weight: 600; }
      .muted { font-size: 0.8rem; color: #71717f; }
      form { margin-top: 1.25rem; text-align: left; }
      label { display: block; font-size: 0.85rem; font-weight: 500; color: #c7c7d2; margin: 0 0 0.35rem; }
      input[type="password"] {
        width: 100%; box-sizing: border-box; padding: 0.6rem 0.7rem; margin: 0 0 1rem;
        border-radius: 0.5rem; border: 1px solid #2a2a38; background: #14141d; color: #e7e7ee; font-size: 1rem;
      }
      input[type="password"]:focus { outline: none; border-color: #6366f1; }
      .btn, button {
        display: inline-block; width: 100%; box-sizing: border-box; padding: 0.65rem 1rem;
        border: 0; border-radius: 0.5rem; background: linear-gradient(110deg, #6366f1, #8b5cf6);
        color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none;
      }
      .err { color: #f87171; font-size: 0.85rem; margin: -0.5rem 0 1rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">music</div>
      {% block body %}{% endblock %}
    </div>
  </body>
</html>

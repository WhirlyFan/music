<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>music</title>
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0b0b12; color: #e7e7ee;
        font: 16px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
      }
      .card { text-align: center; max-width: 24rem; padding: 2.5rem 2rem; }
      .brand {
        font-size: 2rem; font-weight: 600; letter-spacing: -0.02em;
        background: linear-gradient(90deg, #6366f1, #a78bfa);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      h1 { font-size: 1.15rem; font-weight: 600; margin: 1.25rem 0 0.4rem; }
      p { margin: 0; color: #9a9aa8; font-size: 0.95rem; }
      .ok { color: #34d399; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">music</div>
      {% if ok %}
        <h1 class="ok">✓ Email verified</h1>
        <p>You're all set — return to the music app to continue. You can close this tab.</p>
      {% else %}
        <h1>Link invalid or expired</h1>
        <p>This verification link is no longer valid (it may have already been used). Open the app and resend the verification email.</p>
      {% endif %}
    </div>
  </body>
</html>

# Render Blueprint — declarative spec for the entire deployment.
#
# On every push to the connected branch, Render reads this file and reconciles
# live infrastructure to match. New services are provisioned; changed services
# are rebuilt; removed services are NOT auto-deleted (safety against typos).
#
# This file: frontend static site + Django backend + Postgres.
#
# Docs: https://render.com/docs/blueprint-spec
# Companion walkthrough: docs/ops/deploy-render.md

services:
  # The web frontend (a static Vite site) was retired — the product is the
  # desktop app (see desktop/), which bundles the UI and proxies /api + /ws to
  # this backend at api.whirlyfan.com. So this blueprint deploys the backend only.
  # ─────────────────────────────────────────────────────────────────────────
  # Backend — Web Service (free tier sleeps after 15 min idle).
  #
  # Builds backend/Dockerfile. The same image we run locally. The entrypoint
  # runs `migrate` on every boot (idempotent) before exec'ing gunicorn.
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    runtime: docker
    name: music-backend
    rootDir: backend
    plan: free
    region: oregon                 # pin to one region; match the DB below
    branch: main                   # auto-deploy from main; change to a release branch later if desired
    healthCheckPath: /health/      # used by Render's edge to gate traffic
    autoDeploy: true
    # Custom domain for the WebSocket endpoint. Render static sites don't proxy
    # WS upgrades, so the SPA connects its jam socket straight to the backend
    # here (api.whirlyfan.com) instead of through the frontend's rewrites. After
    # `render deploy` picks this up, add the CNAME it shows you at your DNS
    # registrar; Render provisions TLS automatically. HTTP keeps flowing through
    # the frontend rewrites — only WS uses this hostname.
    domains:
      - api.whirlyfan.com
    envVars:
      # Pin the HTTP port Render routes to. Gunicorn binds ${PORT:-8000}; pinning
      # it here makes Render's health check hit the right port deterministically.
      - key: PORT
        value: "8000"

      # ── Django core ─────────────────────────────────────────────────────
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true        # Render generates a strong secret + stores it in encrypted env

      # ── Secrets — VALUES LIVE IN DOPPLER (config: prd) ──────────────────
      # Every `sync: false` entry below is a secret whose value is injected by
      # the Doppler → Render integration. Manage the values in Doppler `prd`, NOT
      # the Render dashboard. They stay declared here as a MANIFEST: they document
      # which secrets the service needs and mark them externally-overridden (the
      # blueprint never carries a value). New secret → add it to Doppler `prd`
      # AND list it here as `sync: false`.

      # Fernet key for app-layer encryption of MFA secrets (TOTP) at rest — a
      # valid 32-byte base64-url Fernet key:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # If lost, existing TOTP rows can't be decrypted — users must re-enroll.
      # Don't rotate without a migration plan.
      - key: MFA_FIELD_ENCRYPTION_KEY
        sync: false

      # ── Google social login (optional) ──────────────────────────────────
      # OAuth 2.0 Web client from Google Cloud Console (free). Until both are
      # set, the "Continue with Google" button simply doesn't render (the app
      # reads the configured providers from allauth's /config). Set the
      # authorized redirect URI in Google to:
      #   https://music.whirlyfan.com/accounts/google/login/callback/
      # New Google signups still require an invite (SocialAccountAdapter gate).
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false

      # (No YouTube secrets here: the cloud never calls YouTube. All extraction —
      # search, playlist/video ingest, audio resolve — runs on the desktop app off
      # the user's own residential IP. See docs/ops.md "YouTube extraction".)

      # ── Host / origin allow-lists ───────────────────────────────────────
      # Django checks the Host header against ALLOWED_HOSTS. With our
      # same-origin Render rewrites, requests arrive at the backend with the
      # BACKEND's host (Render proxies set Host to the destination), so the
      # backend host is what must be allowed here.
      # Render appended a random suffix because `music-backend` was taken, so the
      # real host is music-backend-ll7r.onrender.com. prod.py ALSO auto-trusts
      # RENDER_EXTERNAL_HOSTNAME, so this stays correct even if the suffix changes.
      # api.whirlyfan.com is the WS custom domain (Host header on direct socket
      # connections); the onrender host stays for the HTTP rewrites + health probe.
      # music.whirlyfan.com is the public host the browser uses; /accounts/*
      # reaches the backend via Render's rewrite, which forwards it as
      # X-Forwarded-Host. With USE_X_FORWARDED_HOST=True (prod.py), get_host()
      # validates against this list, so the public host must be present — it's
      # what allauth builds the Google OAuth redirect_uri from.
      - key: DJANGO_ALLOWED_HOSTS
        value: music.whirlyfan.com,music-frontend-d8sr.onrender.com,music-backend-ll7r.onrender.com,api.whirlyfan.com
      # CSRF middleware checks the Origin/Referer of state-changing requests.
      # The browser sends the origin it actually loaded, so once the custom
      # domain is live that's https://music.whirlyfan.com. We trust BOTH it and
      # the .onrender.com origin (comma-separated) so the app keeps working on
      # either URL through the DNS cutover. Drop the onrender one later if you
      # want to force the custom domain only.
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://music.whirlyfan.com,https://music-frontend-d8sr.onrender.com
      # CORS is a defense-in-depth backstop. With rewrites we don't strictly
      # need it, but leaving both frontend origins allow-listed costs nothing.
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://music.whirlyfan.com,https://music-frontend-d8sr.onrender.com

      # Origins allowed to open a WebSocket (CSWSH guard). The SPA loads from
      # music.whirlyfan.com, so that's the Origin on the jam socket's upgrade —
      # NOT the backend's own host. Hostnames only (OriginValidator matches the
      # Origin header's host).
      - key: DJANGO_WEBSOCKET_ALLOWED_ORIGINS
        value: music.whirlyfan.com,music-frontend-d8sr.onrender.com

      # Cross-subdomain session cookie so it rides the WS upgrade to
      # api.whirlyfan.com. SET THIS ONLY after api.whirlyfan.com's DNS is live
      # and you're accessing the app via music.whirlyfan.com (NOT the *.onrender
      # URL — a .whirlyfan.com cookie isn't sent there). See settings/prod.py.
      - key: DJANGO_SESSION_COOKIE_DOMAIN
        value: .whirlyfan.com

      # FRONTEND_ORIGIN is consumed by HEADLESS_FRONTEND_URLS so password-reset
      # / email-verification / invite links in transactional emails point at the
      # real deployed frontend (not localhost). Single-valued — point it at the
      # custom domain so emailed links use the public URL.
      - key: FRONTEND_ORIGIN
        value: https://music.whirlyfan.com

      # Email-verification, password-reset, and invite links all point at the
      # backend's own domain (backend-rendered landing pages), so the desktop app
      # doesn't depend on the (retired) web frontend for those flows. The reset
      # form posts back here, so settings/prod.py auto-trusts this origin for CSRF.
      # See HEADLESS_FRONTEND_URLS / verify_email_page / reset_password_page.
      - key: DJANGO_BACKEND_ORIGIN
        value: https://api.whirlyfan.com

      # Where the invite landing page sends invitees to get the desktop app.
      # Defaults to the GitHub releases page; point it at wherever you host builds.
      - key: DESKTOP_DOWNLOAD_URL
        value: https://github.com/WhirlyFan/music/releases/latest

      # ── Database ────────────────────────────────────────────────────────
      # Render auto-injects the connection string when the service is linked
      # to the database below. The two-role split (app_user / app_admin) we
      # use locally is collapsed to one privileged role in Phase A — see
      # docs/ops/deploy-render.md "Phase B: restore two-role Postgres".
      - key: DATABASE_URL
        fromDatabase:
          name: music-db
          property: connectionString
      - key: DATABASE_URL_ADMIN    # same URL — migrations + runtime share the role
        fromDatabase:
          name: music-db
          property: connectionString

      # ── Gunicorn (ASGI / uvicorn worker) ─────────────────────────────────
      # MUST stay 1 while CHANNEL_LAYERS is the in-memory backend — that layer
      # can't fan jam broadcasts out across workers. One async worker handles
      # many concurrent sockets/requests on its event loop, which suits the
      # 0.5-CPU free tier fine. Raise only after moving to channels-redis.
      - key: WEB_CONCURRENCY
        value: "1"

      # ── Email (Resend via Anymail) ──────────────────────────────────────
      # Set the Resend API key in Doppler `prd` — never in this file. Sign up at
      # https://resend.com (free tier: 3K/mo, no card required). Without a key,
      # allauth's password-reset + signup-verification flows silently fail.
      - key: RESEND_API_KEY
        sync: false                # value from Doppler prd
      # Override to your own verified-domain sender (e.g. noreply@yourdomain.com)
      # when you've verified DKIM/SPF in Resend. Until then, the default
      # `onboarding@resend.dev` in settings/prod.py works for testing.
      - key: DEFAULT_FROM_EMAIL
        sync: false

      # ── Spotify ingest (optional) ───────────────────────────────────────
      # Free Spotify developer app (Client ID + Secret). Unset = Spotify paste
      # returns "not configured"; Apple Music + YouTube need nothing.
      - key: SPOTIFY_CLIENT_ID
        sync: false                # value from Doppler prd
      - key: SPOTIFY_CLIENT_SECRET
        sync: false

      # ── Observability (optional) ────────────────────────────────────────
      # Set SENTRY_DSN in the Render dashboard to enable error tracking.
      # Left unset here so the file doesn't leak secrets if forked.
      - key: SENTRY_DSN
        sync: false                # marks it as "manage this one in the dashboard"

# ─────────────────────────────────────────────────────────────────────────────
# Managed Postgres (free 90 days, then $7/mo Starter required).
#
# After 90 days Render will email warnings and eventually pause the service.
# Upgrade to Starter to keep it (recommended) or delete + recreate for another
# 90 days (loses all data).
# ─────────────────────────────────────────────────────────────────────────────
databases:
  - name: music-db
    plan: free
    region: oregon                 # MUST match the backend service region
    # NOTE: Render does NOT auto-upgrade major versions of an existing DB.
    # To move from 16 → 17 on Render, you must delete the existing database
    # in the dashboard so the blueprint re-provisions a fresh one at the
    # version below. Acceptable here because the dev/free DB is throwaway;
    # in a real prod migration you'd pg_dump + restore against a new DB.
    postgresMajorVersion: "18"

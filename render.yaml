# Render Blueprint — declarative spec for the entire deployment.
#
# On every push to the connected branch, Render reads this file and reconciles
# live infrastructure to match. New services are provisioned; changed services
# are rebuilt; removed services are NOT auto-deleted (safety against typos).
#
# This file: frontend static site + Django backend + Postgres.
#
# Docs: https://render.com/docs/blueprint-spec
# Companion walkthrough: docs/ops/deploy-render.md

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — Static Site (free forever).
  #
  # Renders the Vite build output. The four `rewrite` rules below are the
  # heart of the same-origin design: from the browser's perspective, /api/*,
  # /_allauth/*, /admin/*, and /health/ all live on the SAME host as the SPA.
  # That means session cookies, CSRF tokens, and SameSite=Lax all work
  # without CORS contortions — identical to local dev behind nginx.
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    runtime: static
    name: music-frontend
    rootDir: frontend
    # Render's static-site build container has BOTH `/usr/bin` and
    # `/usr/lib/node_modules` read-only — so corepack-enable AND npm-install-g
    # both crash with EROFS. We sidestep by using `npx --yes` which fetches
    # pnpm into a writable temp dir per-invocation and runs it directly.
    #
    # pnpm version pinned EXACTLY (matches packageManager field in
    # frontend/package.json + the version action-setup uses in CI). Bump in
    # one place; supply-chain attack surface narrows to that one version.
    #
    # `cp -r ../docs ./_docs` makes the repo-root `docs/` directory visible
    # inside the frontend build context so the in-app docs viewer's Vite
    # glob (`import.meta.glob('/_docs/**/*.md')`) finds the markdown files.
    # In docker compose dev that's handled by a `./docs:/app/_docs:ro` bind
    # mount; on Render the build runs without that mount, so we copy.
    buildCommand: >-
      rm -rf ./_docs && cp -r ../docs ./_docs &&
      npx --yes pnpm@11.3.0 install --frozen-lockfile &&
      npx --yes pnpm@11.3.0 build
    staticPublishPath: ./dist
    envVars:
      # NODE_VERSION pins Render's build-env Node to match our Dockerfile + CI.
      - key: NODE_VERSION
        value: 24.16.0
      # Build-time variable: baked into the bundle, NOT runtime overridable.
      - key: VITE_API_BASE
        value: /api/v1
    routes:
      # Proxy server-rendered Django + DRF + allauth paths to the backend.
      # Order matters — most specific first.
      - type: rewrite
        source: /api/*
        destination: https://music-backend.onrender.com/api/*
      - type: rewrite
        source: /_allauth/*
        destination: https://music-backend.onrender.com/_allauth/*
      - type: rewrite
        source: /admin/*
        destination: https://music-backend.onrender.com/admin/*
      - type: rewrite
        source: /static/*
        destination: https://music-backend.onrender.com/static/*
      - type: rewrite
        source: /health
        destination: https://music-backend.onrender.com/health/
      # SPA fallback: anything else serves the React index so client-side
      # routing (TanStack Router) takes over.
      - type: rewrite
        source: /*
        destination: /index.html
    # Long-cache the immutable hashed bundle, never cache the entry HTML.
    # Security response headers mirror the Django side (settings/prod.py) so
    # the SPA shell ships with the same CSP + Permissions-Policy baseline.
    # Render only applies these to static responses — proxied `rewrite`s to
    # the backend preserve Django's own headers, so they don't double up.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
      - path: /*
        name: Permissions-Policy
        value: "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=()"
      - path: /*
        name: Referrer-Policy
        value: same-origin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY

  # ─────────────────────────────────────────────────────────────────────────
  # Backend — Web Service (free tier sleeps after 15 min idle).
  #
  # Builds backend/Dockerfile. The same image we run locally. The entrypoint
  # runs `migrate` on every boot (idempotent) before exec'ing gunicorn.
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    runtime: docker
    name: music-backend
    rootDir: backend
    plan: free
    region: oregon                 # pin to one region; match the DB below
    branch: main                   # auto-deploy from main; change to a release branch later if desired
    healthCheckPath: /health/      # used by Render's edge to gate traffic
    autoDeploy: true
    envVars:
      # ── Django core ─────────────────────────────────────────────────────
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true        # Render generates a strong secret + stores it in encrypted env

      # Fernet key for app-layer encryption of MFA secrets (TOTP) at rest.
      # Must be a valid 32-byte base64-url-encoded Fernet key. Generate with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Paste into Render dashboard. `sync: false` so it never lands in the
      # repo. If lost, existing TOTP rows can't be decrypted — users must
      # re-enroll. Don't rotate without a migration plan.
      - key: MFA_FIELD_ENCRYPTION_KEY
        sync: false

      # ── Host / origin allow-lists ───────────────────────────────────────
      # Django checks the Host header against ALLOWED_HOSTS. With our
      # same-origin Render rewrites, requests arrive at the backend with the
      # BACKEND's host (Render proxies set Host to the destination), so the
      # backend host is what must be allowed here.
      - key: DJANGO_ALLOWED_HOSTS
        value: music-backend.onrender.com
      # CSRF middleware checks the Origin/Referer of state-changing requests.
      # Same-origin from the browser's perspective means Origin =
      # https://<frontend>.onrender.com — that's what to trust.
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://music-frontend.onrender.com
      # CORS is a defense-in-depth backstop. With rewrites we don't strictly
      # need it, but leaving the frontend origin allow-listed costs nothing.
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://music-frontend.onrender.com

      # FRONTEND_ORIGIN is consumed by HEADLESS_FRONTEND_URLS so password-reset
      # / email-verification links in transactional emails point at the
      # actual deployed frontend (not localhost). Change ONE value here and
      # both link generation + email content adapt.
      - key: FRONTEND_ORIGIN
        value: https://music-frontend.onrender.com

      # ── Database ────────────────────────────────────────────────────────
      # Render auto-injects the connection string when the service is linked
      # to the database below. The two-role split (app_user / app_admin) we
      # use locally is collapsed to one privileged role in Phase A — see
      # docs/ops/deploy-render.md "Phase B: restore two-role Postgres".
      - key: DATABASE_URL
        fromDatabase:
          name: music-db
          property: connectionString
      - key: DATABASE_URL_ADMIN    # same URL — migrations + runtime share the role
        fromDatabase:
          name: music-db
          property: connectionString

      # ── Gunicorn ────────────────────────────────────────────────────────
      # Free tier has 0.5 CPU; 2 workers fits without thrash.
      - key: WEB_CONCURRENCY
        value: "2"

      # ── Email (Resend via Anymail) ──────────────────────────────────────
      # Paste your Resend API key into the dashboard — never into this file.
      # Sign up at https://resend.com (free tier: 3K/mo, no card required).
      # Without a key, allauth's password-reset + signup-verification flows
      # silently fail; with one, they deliver through Resend.
      - key: RESEND_API_KEY
        sync: false                # dashboard-managed; encrypted at rest
      # Override to your own verified-domain sender (e.g. noreply@yourdomain.com)
      # when you've verified DKIM/SPF in Resend. Until then, the default
      # `onboarding@resend.dev` in settings/prod.py works for testing.
      - key: DEFAULT_FROM_EMAIL
        sync: false

      # ── Spotify ingest (optional) ───────────────────────────────────────
      # Free Spotify developer app (Client ID + Secret). Unset = Spotify paste
      # returns "not configured"; Apple Music + YouTube need nothing.
      - key: SPOTIFY_CLIENT_ID
        sync: false                # dashboard-managed; encrypted at rest
      - key: SPOTIFY_CLIENT_SECRET
        sync: false

      # YouTube PO-token provider: runs co-located INSIDE the backend image
      # (Node server on 127.0.0.1:4416, started by the entrypoint) — no separate
      # Render service, no extra cost, wakes/sleeps with the backend. The
      # YOUTUBE_POT_BASE_URL is baked into the image; nothing to set here.

      # ── Observability (optional) ────────────────────────────────────────
      # Set SENTRY_DSN in the Render dashboard to enable error tracking.
      # Left unset here so the file doesn't leak secrets if forked.
      - key: SENTRY_DSN
        sync: false                # marks it as "manage this one in the dashboard"

# ─────────────────────────────────────────────────────────────────────────────
# Managed Postgres (free 90 days, then $7/mo Starter required).
#
# After 90 days Render will email warnings and eventually pause the service.
# Upgrade to Starter to keep it (recommended) or delete + recreate for another
# 90 days (loses all data).
# ─────────────────────────────────────────────────────────────────────────────
databases:
  - name: music-db
    plan: free
    region: oregon                 # MUST match the backend service region
    # NOTE: Render does NOT auto-upgrade major versions of an existing DB.
    # To move from 16 → 17 on Render, you must delete the existing database
    # in the dashboard so the blueprint re-provisions a fresh one at the
    # version below. Acceptable here because the dev/free DB is throwaway;
    # in a real prod migration you'd pg_dump + restore against a new DB.
    postgresMajorVersion: "18"

# Production overrides for self-hosting the BACKEND API on a Docker host. Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# The hosted production backend actually runs on Render (see render.yaml); this
# override exists for anyone who wants to self-host the API on a plain Docker VM.
#
# There is NO web frontend here: the product is the desktop app (see desktop/),
# which bundles the UI and talks to the backend directly. So this prod profile
# runs only the backend + its database — the dev `frontend` (Vite) and `nginx`
# services are parked in a never-activated profile.
#
# Differences from dev:
#   - backend runs gunicorn + DJANGO_SETTINGS_MODULE=config.settings.prod
#   - no source-code volume mount (code is baked into the image)
#   - frontend + nginx do not start

services:
  backend:
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes: []   # no source mount in prod
    ports:
      - "8000:8000"
    healthcheck:
      # /health/ is provided by django-health-check (DB, cache, storage)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # The web frontend is retired (the desktop app is the deliverable). Park the
  # dev Vite + nginx services in a profile that `up` never activates.
  frontend:
    profiles: ["dev-only"]

  nginx:
    profiles: ["dev-only"]

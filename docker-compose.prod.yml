# Production overrides. Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences from dev:
#   - backend runs gunicorn + DJANGO_SETTINGS_MODULE=config.settings.prod
#   - frontend builds the React bundle into a single nginx-based image
#     (Dockerfile target=prod). That image becomes the public entry point on :80.
#   - The dev `nginx` service is disabled — its job (proxying to Vite + Django)
#     is taken over by the frontend service in prod.
#   - No source-code volume mounts (code is baked into the images).

services:
  backend:
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes: []   # no source mount in prod
    healthcheck:
      # /health/ is provided by django-health-check (DB, cache, storage)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Single image that serves the built React bundle AND reverse-proxies /api/*.
  # In prod this REPLACES both the dev `frontend` (Vite) and `nginx` services.
  frontend:
    build:
      context: ./frontend
      target: prod
    command: nginx -g 'daemon off;'
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

  # The dev nginx service is unnecessary in prod (frontend service is now the
  # public entry point). Putting it in a never-activated profile keeps it from
  # starting under `docker compose ... up`.
  nginx:
    profiles: ["dev-only"]

# Home Tailscale exit node — gives the deployed backend a residential IP for
# YouTube extraction (clearing the datacenter bot wall) WITHOUT exposing anything
# to the public internet. Traffic is private + peer-to-peer over your tailnet.
#
#   1. cp .env.example .env   (paste a Tailscale auth key)
#   2. docker compose up -d
#   3. Approve this machine as an exit node in the Tailscale admin console
#      (Machines → music-home-exit → Edit route settings → "Use as exit node").
#   4. In Render, set TS_AUTHKEY + TS_EXIT_NODE=music-home-exit, redeploy.
#
# Clone the repo + drop in a .env on any machine and `docker compose up` — that
# machine becomes the exit node. Works only while it's running (the trade for a
# free residential IP). Stop with `docker compose down`.
services:
  tailscale:
    image: tailscale/tailscale:stable
    hostname: ${TS_HOSTNAME:-music-home-exit}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      # Advertise this node as an exit node so the backend can egress through it.
      - TS_EXTRA_ARGS=--advertise-exit-node
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    # An exit node forwards packets, so the kernel needs IP forwarding on.
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped

volumes:
  ts-state: {}

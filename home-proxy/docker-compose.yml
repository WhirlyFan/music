# Home Tailscale exit node — gives the deployed backend a residential IP for
# YouTube extraction (clearing the datacenter bot wall) WITHOUT exposing anything
# to the public internet. Traffic is private + peer-to-peer over your tailnet.
#
# Run it (TS_AUTHKEY pulled from Doppler prd — no .env to manage):
#   cd home-proxy && make up
# Or without Doppler: `cp .env.example .env` (set TS_AUTHKEY) then `docker compose up -d`.
#
# The auth key is tagged tag:music, and the tailnet ACL auto-approves tag:music
# exit nodes — so this comes up approved, no manual step. Works only while it's
# running (the trade for a free residential IP). Stop with `make down`.
services:
  tailscale:
    image: tailscale/tailscale:stable
    hostname: ${TS_HOSTNAME:-music-home-exit}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      # Advertise this node as an exit node so the backend can egress through it.
      - TS_EXTRA_ARGS=--advertise-exit-node
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    # An exit node forwards packets, so the kernel needs IP forwarding on.
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    restart: unless-stopped

volumes:
  ts-state: {}

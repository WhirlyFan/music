# pnpm 11+ reads settings from this file (not .npmrc or package.json's pnpm field).
# Single-package projects can still have a pnpm-workspace.yaml — it's used purely
# for config.
#
# `minimumReleaseAge` blocks packages published within the window (in minutes).
# This is the primary in-tool defense against the npm supply-chain attack class
# where a compromised account publishes a malicious patch release. A 24-hour
# hold gives the community time to spot + report compromise before we install.
#
# - 1440 = 24 hours (pnpm's default; what we want)
# -    0 = disabled (used during bootstrap when we needed fresh packages)
#
# Override per-install if a fresh package is genuinely needed:
#     pnpm install --ignore-min-release-age
# That bypass is loud + intentional, which is the point.
minimumReleaseAge: 1440

# Write EXACT versions on `pnpm add` (no ^/~), so a direct dep can't silently
# drift into a newer — possibly compromised — release. (`.npmrc save-exact` is
# NOT honored by pnpm 11; this is the real setting.) All deps are already pinned
# exact in package.json; the lockfile pins the transitive tree.
savePrefix: ''
